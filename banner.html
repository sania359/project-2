<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banner Practice</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#F1E2D1;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}


header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    font-size:32px;
    font-family:'Arial Black',sans-serif;
    letter-spacing:2px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}



.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    color:#541A1A;
    transform:translateY(-50%) scale(1.05);
}



main{
    flex:1;
    width:95%;
    max-width:1200px;
    margin:35px auto;
}



@keyframes runtext{
    from{left:-500px;}
    to{left:100%;}
}

@keyframes changepic{
    0%,100%{background-image:url(Images/p1.jpg);}
    20%{background-image:url(Images/p2.jpg);}
    40%{background-image:url(Images/p3.jpg);}
    60%{background-image:url(Images/p4.jpg);}
    80%{background-image:url(Images/p5.jpg);}
}

@keyframes mycolor{
    10%{color:black;}
    30%{color:#6f6f9e;}
    60%{color:#565672;}
    90%{color:#3f3f50;}
}



.banner{
    background:white;
    background-image:url(Images/p1.jpg);
    background-repeat:no-repeat;
    background-size:cover;
    background-position:center;
    height:500px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    animation:changepic 15s linear infinite;
}

#text{
    position:relative;
    left:-500px;
    top:40px;
    font-size:45px;
    font-family:'Arial Black',sans-serif;
    color:#0a0525;
    text-shadow:4px 4px 6px black;
    text-transform:uppercase;
    white-space:nowrap;
    animation:runtext 20s linear infinite alternate,
              mycolor 2s infinite;
}


footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
    font-size:16px;
}

footer p{
    margin:6px 0;
}



@media(max-width:768px){

    header{
        font-size:24px;
        padding:20px 15px;
    }

    .back-btn{
        left:10px;
        padding:8px 12px;
        font-size:14px;
    }

    .banner{
        height:300px;
    }

    #text{
        font-size:24px;
        top:20px;
    }

}

</style>
</head>

<body>

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    BANNER

</header>

<main>

    <div class="banner">

        <div id="text">
            Welcome To India
        </div>

    </div>

</main>

<footer>

    <p>© 2026</p>
    <p>| All Rights Reserved |</p>

</footer>

</body>
</html>
