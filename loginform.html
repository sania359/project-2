<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#DEE1D1;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}

header h2{
    font-size:30px;
    margin:0;
    letter-spacing:1px;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    color:#541A1A;
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
    flex:1;
    width:100%;
    max-width:420px;
    margin:40px auto;
    background:#F1E2D1;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 24px rgba(0,0,0,.1);
}

caption{
    font-size:26px;
    font-weight:bold;
    padding:15px;
    color:#541A1A;
}

table{
    width:100%;
}

td{
    padding:10px 5px;
}

label{
    font-weight:bold;
    color:#333;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    outline:none;
    transition:.3s;
}

input[type="text"]:focus,
input[type="password"]:focus{
    border-color:#541A1A;
    box-shadow:0 0 5px rgba(84,26,26,.3);
}

/* ================= BUTTONS ================= */

.btn-container{
    display:flex;
    gap:12px;
    margin-top:10px;
}

.btn{
    flex:1;
    background:#541A1A;
    color:#F1E2D1;
    border:none;
    padding:12px;
    border-radius:6px;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

input[type="reset"].btn{
    background:#e5e7eb;
    color:#333;
}

input[type="reset"].btn:hover{
    background:#d1d5db;
}

/* ================= FOOTER ================= */

footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

footer p{
    margin:5px 0;
}

/* ================= MOBILE ================= */

@media(max-width:500px){

    header{
        padding:20px 15px;
    }

    header h2{
        font-size:24px;
    }

    .back-btn{
        left:10px;
        padding:8px 12px;
        font-size:14px;
    }

    main{
        width:95%;
        margin:20px auto;
        padding:20px;
    }

    table,
    tbody,
    tr,
    td{
        display:block;
        width:100%;
    }

    td{
        padding:6px 0;
    }

    .btn-container{
        flex-direction:column;
    }

}

</style>
</head>

<body>

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    <h2>LOGIN PAGE</h2>

</header>

<main>

<form action="http://tataplay/user/login.php" method="post">

<table>

<caption>Login Form</caption>

<tr>
    <td><label for="userid">Login Id</label></td>
    <td><input type="text" id="userid" name="userid" placeholder="Type User Id"></td>
</tr>

<tr>
    <td><label for="upass">Password</label></td>
    <td><input type="password" id="upass" name="upass" placeholder="Password"></td>
</tr>

<tr>
    <td></td>
    <td>
        <div class="btn-container">
            <input type="submit" value="Login" class="btn">
            <input type="reset" value="Reset" class="btn">
        </div>
    </td>
</tr>

</table>

</form>

</main>

<footer>
    <p>© 2026</p>
    <p>| All Rights Reserved |</p>
</footer>

</body>
</html>
