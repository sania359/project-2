<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Loop Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#EDDCC6;
}

header{
    width:100%;
    background:#BF4646;
    color:#E7E1B1;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    
}


.box{
    width:90%;
    margin:40px auto;
    background:#FFF4EA;
    border-radius:15px;
    padding:25px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    box-shadow:0px 0px 15px gray;
}


.pic{
    width:30%;
    border-radius:10px;
    box-shadow:10px 10px 10px gray;
    transition:0.5s;
    cursor:pointer;
}


.button{
    background:#7EACB5;
    color:#E7E1B1;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0px 0px 10px gray;
    transition:0.5s;

    display:block;
    width:fit-content;
    margin:20px auto;
}

.button:hover
{
    transform:scale(1.05);
}
footer{
    width:100%;
    background:#BF4646;
    color:#E7E1B1;
    text-align:center;
    padding:18px;
    margin-top:40px;
    font-size:18px;
}


@media(max-width:768px)
{
    .pic{
        width:45%;
    }

    header{
        font-size:24px;
    }
     .button{
        display:block;
        width:150px;
        margin:20px auto;
        text-align:center;
}

</style>
</head>

<body>


<header>
    LOOP IMAGE GALLERY
</header>

<div class="box" id="gallery"></div>
 <a href="java practice.html" class="button">Back</a>

<script>

// CREATE IMAGES USING LOOP

function preload()
{
    document.title = "No Error"

    var gallery = document.getElementById("gallery")

    for(var i=1; i<=5; i++)
    {
        var p = new Image()

        gallery.appendChild(p)

        p.className = "pic"

        p.src = "images/j" + i + ".jpg"

        p.onmouseover = function()
        {
            this.style.transform = "scale(1.05)"
        }

        p.onmouseout = function()
        {
            this.style.transform = "scale(1)"
        }
    }
}

window.onload = preload

</script>

<footer>
    © 2026 All Rights Reserved
</footer>

</body>
</html>
