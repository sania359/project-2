<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#eeeae6;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    padding:25px 20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    position:relative;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= GALLERY ================= */

.box{
    width:90%;
    margin:40px auto;
    background:#F1E2D1;
    border-radius:15px;
    padding:25px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    box-shadow:0px 0px 15px gray;
}

.pic{
    width:30%;
    border-radius:10px;
    box-shadow:10px 10px 10px gray;
    transition:0.5s;
    cursor:pointer;
}

/* ================= BUTTON ================= */

.button{
    background:#541A1A;
    color:#F1E2D1;
    padding:12px 30px;
    border-radius:8px;
    text-decoration:none;
    box-shadow:0px 0px 10px gray;
    transition:0.5s;
    display:block;
    width:fit-content;
    margin:20px auto;
}

.button:hover{
    transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:18px;
    margin-top:auto;
    font-size:18px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
    font-size:24px;
    padding:18px;
}

.pic{
    width:45%;
}

.button{
    width:150px;
    text-align:center;
}

.back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}

}

</style>
</head>

<body>

<header>
    <a href="javapractice.html" class="back-btn">←</a>
    LOOP IMAGE GALLERY
</header>

<div class="box" id="gallery"></div>



<script>

function preload()
{
    document.title = "Loop Gallery";

    var gallery = document.getElementById("gallery");

    for(var i=1; i<=5; i++)
    {
        var p = new Image();
        gallery.appendChild(p);

        p.className = "pic";
        p.src = "images/j" + i + ".jpg";

        p.onmouseover = function(){
            this.style.transform = "scale(1.05)";
        }

        p.onmouseout = function(){
            this.style.transform = "scale(1)";
        }
    }
}

window.onload = preload;

</script>

<footer>
    © 2026 All Rights Reserved
</footer>

</body>
</html>
