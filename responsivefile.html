<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Responsive Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* Page structural dynamic body */
body{
    background:#F6F4E8;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

.top-heading{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    font-size:26px;
    font-weight:bold;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);
    margin-bottom:25px;
    position:relative;
}

header{
    width:90%;
    max-width: 1200px;
    margin:auto;
    background:#E5EEE4;
    padding:20px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

/* Profile Boxes */
#col1{
    width:130px;
    height:130px;
    border-radius:50%;
    overflow:hidden;
    border:4px solid #541A1A;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
    flex-shrink: 0;
}

#col2{
    flex:1;
    height:130px;
    overflow:hidden;
    border-radius:12px;
    border:3px solid#541A1A;
    box-shadow:0 4px 10px rgba(0,0,0,0.15);
}

#col1 img,
#col2 img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Navigation */
nav{
    width:90%;
    max-width: 1200px;
    margin:25px auto;
    text-align:center;
}

nav ol li{
    list-style:none;
    display:inline-block;
    background:#541A1A;
    padding:12px 24px;
    margin:6px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.15);
    transition:0.3s;
}

nav ol li:hover{
    background:#541A1A;
    transform:scale(1.05);
}

nav a{
    color:#F6F4E8;
    text-decoration:none;
    font-weight: bold;
}

/* Main Cards Container - Desktop Responsive Grid Setup */
main{
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* Strict 3 Column Grid for Big Screen */
    gap: 25px;
    width: 90%;
    max-width: 1200px;
    margin: auto;
}

/* Card Style (Responsive Box Aspect Ratio) */
.cardstyle{
    width: 100%; /* Sizing width handling via grid column spans */
    height: 240px;
    background:#E5EEE4;
    padding:8px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.12);
    transition:0.3s;
}

.cardstyle:hover{
    transform:translateY(-5px);
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.pic{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:8px;
}

/* BACK BUTTON */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    transition:.3s;
}

.back-btn:hover{
    background:#C2D099;
    color:#541A1A;
    transform:translateY(-50%) scale(1.05);
}

/* Sticky Bottom Footer Area */
footer{
    background:#541A1A;
    color:#F1E2D1;
    margin-top:auto; 
    padding:40px 20px;
    text-align:center;
    font-size:14px;
}

footer h1{
    font-size:26px;
    margin-bottom:15px;
}

footer ul{
    list-style: none;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

footer a{
    color:#cbd5e1;
    text-decoration:none;
    transition: 0.2s;
}

footer a:hover{
    color:white;
}

details{
    margin-top: 15px;
    cursor: pointer;
}

details summary{
    font-weight: bold;
    color: #E6EEC9;
    margin-bottom: 10px;
}

/* MEDIA QUERIES FOR ADAPTIVE VIEWPORTS */

/* Tablet (Medium Screens Laptop Views) */
@media(max-width: 1024px){
    main {
        grid-template-columns: repeat(2, 1fr); /* 2 Columns view on mini screen laptops */
    }
}

/* Mobile Devices Views */
@media(max-width:768px){
    .top-heading{
        font-size:22px;
        padding: 15px;
    }

    header{
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    #col1{
        width:110px;
        height:110px;
    }

    #col2{
        width:100%;
        height:120px;
    }

    nav ol li{
        display:block;
        margin:10px auto;
        width:80%;
        max-width:280px;
    }

    main {
        grid-template-columns: 1fr; /* Single column flow structure on mobile */
    }

    .cardstyle{
        height: 230px;
    }

    footer ul{
        flex-direction: column;
        gap: 10px;
    }
    .back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}
}
</style>
</head>

<body>

    <div class="cardstyle">
        <img src="images/a3.jpg" class="pic" alt="Work 3">
    </div>

    <div class="cardstyle">
        <img src="images/a4.jpg" class="pic" alt="Work 4">
    </div>

    <div class="cardstyle">
        <img src="images/a5.jpg" class="pic" alt="Work 5">
    </div>
</main>



<footer>

</html>
