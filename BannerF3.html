<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider Banner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#F1E2D1;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* ================= HEADER ================= */

header{
background:#541A1A;
color:#F1E2D1;
text-align:center;
padding:25px 20px;
font-size:30px;
font-weight:bold;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
background:#F1E2D1;
color:#541A1A;
text-decoration:none;
padding:10px 16px;
border-radius:8px;
font-size:16px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
transition:0.3s;
}

.back-btn:hover{
transform:translateY(-50%) scale(1.05);
}

/* ================= BANNER ================= */

.banner-section{
display:flex;
justify-content:center;
padding:30px 20px;
flex:1;
}

.banner-box{
width:90%;
max-width:1100px;
height:450px;
background:white;
border-radius:15px;
overflow:hidden;
position:relative;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.pic{
width:100%;
height:100%;
position:absolute;
top:0;
left:0;
object-fit:cover;
transition:2s;
}

/* ================= FOOTER ================= */

footer{
background:#541A1A;
color:#F1E2D1;
text-align:center;
padding:20px;
margin-top:auto;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
font-size:22px;
padding:18px;
}

.banner-box{
height:250px;
}

.back-btn{
font-size:14px;
padding:8px 12px;
}

}

</style>
</head>

<body>

<header>
    <a href="../html/htmlpractice.html" class="back-btn">←</a>
    Image Banner
</header>

<section class="banner-section">

<div class="banner-box">

<img src="images/p1.jpg" class="pic">
<img src="images/p2.jpg" class="pic">
<img src="images/j3.jpg" class="pic">
<img src="images/j4.jpg" class="pic">
<img src="images/j5.jpg" class="pic">

</div>

</section>

<script>

var plist = document.getElementsByTagName("img")

var p1 = plist[4]
var p2 = plist[3]
var j3 = plist[2]
var j4 = plist[1]
var j5 = plist[0]

var c = -1

function runbanner(){

switch(c){

case 0: p1.style.opacity = 0; break;
case 1: p2.style.opacity = 0; break;
case 2: j3.style.opacity = 0; break;
case 3: j4.style.opacity = 0; break;
case 4:
p1.style.opacity = 1
p2.style.opacity = 1
j3.style.opacity = 1
j4.style.opacity = 1
j5.style.opacity = 1
break;

}

if(c < 4) c++
else c = 0

setTimeout(runbanner,5000)

}

runbanner()

</script>

<footer>
© 2026 My Website | All Rights Reserved
</footer>

</body>
</html>
