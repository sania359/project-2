<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audio Video</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#E8ECEF;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    position:relative;
}

header h1{
    font-size:34px;
    font-family:"Arial Black",sans-serif;
    text-transform:uppercase;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
    flex:1;
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.media-box{
    background:#F1E2D1;
    border-radius:15px;
    padding:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);

    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
}

.media-item{
    flex:1;
    min-width:320px;
    text-align:center;
}

.media-item h2{
    color:#541A1A;
    margin-bottom:20px;
    font-size:24px;
}

audio{
    width:100%;
    max-width:350px;
    border-radius:10px;
}

video{
    width:100%;
    max-width:550px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

/* ================= FOOTER ================= */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

footer p{
    margin:6px 0;
}

/* ================= TABLET ================= */

@media(max-width:992px){

header h1{
    font-size:28px;
}

.media-box{
    gap:30px;
}

video{
    max-width:100%;
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
    padding:20px 15px;
}

header h1{
    font-size:20px;
}

.back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}

main{
    width:95%;
    margin:25px auto;
}

.media-box{
    padding:20px;
    flex-direction:column;
}

.media-item{
    width:100%;
    min-width:100%;
}

.media-item h2{
    font-size:20px;
}

audio,
video{
    width:100%;
}

footer{
    font-size:14px;
}

}

</style>

</head>

<body>

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    <h1>USING MEDIA (AUDIO / VIDEO)</h1>

</header>

<main>

<div class="media-box">

    <div class="media-item">

        <h2>Audio</h2>

        <audio controls autoplay loop muted>
            <source src="images/a1.mp3" type="audio/mpeg">
            Your browser does not support audio.
        </audio>

    </div>

    <div class="media-item">

        <h2>Video</h2>

        <video controls autoplay loop muted>
            <source src="images/a2.mp4" type="video/mp4">
            Your browser does not support video.
        </video>

    </div>

</div>

</main>

<footer>

<p>© 2026</p>
<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
