<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Change</title>

<style>
 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif; 
  }

html{
   scroll-behavior: smooth;
}
  
body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    font-size:24px;
    font-family:Arial Black;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:15px;
    box-shadow:2px 5px 8px black;
    margin-bottom:25px;
    border-radius:12px;
    position:relative; /* BACK BUTTON KE LIYE */
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:8px 14px;
    border-radius:6px;
    font-size:14px;
    font-weight:bold;
    box-shadow:0px 2px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

.container{
    width:100%;
    display:flex;
    flex:1;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

.box{
    width:85%;
    height:500px;
    margin-top:20px;
    border-radius:15px;
    background:white;
    box-shadow:0px 5px 15px rgba(0,0,0,0.15);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    color:#444;
    transition:0.5s;
}

.button{
   background:#541A1A;
   color:#F1E2D1;
   padding:10px 18px;
   border-radius:6px;
   cursor:pointer;
   text-decoration:none;
   box-shadow:0px 0px 8px gray;
   display:inline-block;
   transition:0.4s;
   border:none;
   font-size:14px;
   margin-top:15px;
}

.button:hover{
   transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
background:#541A1A;
color:#F1E2D1;
text-align:center;
padding:25px;
font-size:13px;
border-radius:12px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    header{
        font-size:20px;
        padding:12px;
    }

    .box{
        width:100%;
        height:220px;
        font-size:18px;
    }

    .button{
        width:180px;
        text-align:center;
        font-size:13px;
        padding:9px;
    }

    footer{
        padding:20px;
        font-size:12px;
    }

}
</style>
</head>

<body>

<header>
    <a href="javapractice.html" class="back-btn">←</a>
    Interactive Background Effects
</header>

<div class="container">

   <button id="btn" class="button">
      Create Random Color
   </button>

   <div class="box" id="colorbox"></div>

  
</div>

<script>
 var b = document.getElementById("btn")

 function randomcolor()
 {
    document.title ="Working"

    var red = Math.round(Math.random()*255)
    var green = Math.round(Math.random()*255)
    var blue = Math.round(Math.random()*255)
    
    var c= "rgb("+red+","+green+","+blue+")"

    document.getElementById("colorbox").style.background = c 
 }

 b.onclick = randomcolor
</script> 

<footer>
    <p> © 2026 All Rights Reserved </p>
</footer>  

</body>
</html>
