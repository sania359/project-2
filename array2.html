<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Images Collection</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F1E2D1;
}

/* ================= HEADER (UPDATED WIDTH) ================= */

header{
    position:relative;
    font-size:40px;
    text-transform:uppercase;
    font-family:Arial Black;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:30px 20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    width:90%;              /* ⬅️ increased width */
    margin:20px auto 50px;
    border-radius:12px;
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}

/* ================= GALLERY ================= */

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:20px;
}

.mystyle{
    width:300px;
    height:220px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition:0.4s;
}

.mystyle:hover{
    transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:20px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    header{
        width:95%;   /* mobile pe full width feel */
        font-size:24px;
        padding:20px;
    }

    .mystyle{
        width:90%;
        height:220px;
    }

}

</style>
</head>

<body>

<header>
    <a href="javapractice.html" class="back-btn">←</a>
    Images Collection
</header>

<div class="gallery" id="gallery"></div>

<footer>
    <p>© 2026 All Rights Reserved</p>
</footer>

<script>

var pic = [
"https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600",
"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600",
"https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600",
"https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=600",
"https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=600",
"https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600",
"https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=600",
"https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600",
"https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600",
"https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=600",
"https://images.unsplash.com/photo-1500534623283-312aade485b7?w=600"
];

var gallery = document.getElementById("gallery");

for(var i = 0; i < pic.length; i++)
{
    gallery.innerHTML +=
    "<img class='mystyle' src='" + pic[i] + "' alt='Image'>";
}

</script>

</body>
</html>
