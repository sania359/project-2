<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">

<title>Fly Out Menu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F1E2D1;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}



header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    position:relative;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
}

header h1{
    font-size:34px;
    font-family:"Arial Black",sans-serif;
    letter-spacing:2px;
}


.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}



#menu{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    width:60px;
    z-index:1000;
}

.menu-icon{
    width:50px;
    height:50px;
    background:#F1E2D1;
    color:#541A1A;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
    transition:.3s;
}

.menu-icon:hover{
    background:#C2D099;
}

ol{
    list-style:none;
    position:absolute;
    right:0;
    top:60px;
    width:220px;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
    max-height:0;
    transition:.4s;
}

#menu:hover ol{
    max-height:400px;
}

ol li{
    border-bottom:1px solid #ddd;
}

ol li:last-child{
    border-bottom:none;
}

ol li a{
    display:block;
    padding:16px;
    text-decoration:none;
    color:#541A1A;
    font-weight:bold;
    transition:.3s;
}

ol li:hover{
    background:#C2D099;
}

ol li:hover a{
    padding-left:22px;
}


main{
    flex:1;
}


footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
    font-size:16px;
}

footer p{
    margin:6px 0;
}


@media(max-width:992px){

header h1{
    font-size:28px;
}

}



@media(max-width:768px){

header{
    padding:20px 15px;
}

header h1{
    font-size:22px;
}

.back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}

#menu{
    right:10px;
}

.menu-icon{
    width:42px;
    height:42px;
    font-size:24px;
}

ol{
    width:180px;
    top:52px;
}

ol li a{
    padding:14px;
    font-size:14px;
}

footer{
    font-size:14px;
    padding:18px;
}

}

</style>

</head>

<body>

<header>

<a href="htmlpractice.html" class="back-btn">←</a>

<h1>FLY OUT MENU</h1>

<div id="menu">

<div class="menu-icon">
<i class="ri-menu-line"></i>
</div>

<ol>
    <li><a href="index.html">Home</a></li>
    <li><a href="htmlpractice.html">Practice Work</a></li>
    <li><a href="profile.html">About</a></li>
    <li><a href="#">Contact</a></li>
</ol>

</div>

</header>

<main>

</main>

<footer>

<p>© 2026</p>

<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
