<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color 2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    padding:25px 20px;
    text-align:center;
    position:relative;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

header h1{
    font-size:32px;
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= CONTROLS ================= */

.controls{
    width:50%;
    background:#F1E2D1;
    text-align:center;
    margin:30px auto 20px;
    padding:30px;
    border-radius:15px;
    box-shadow:0px 0px 15px #655f61;
}

/* ================= BOX ================= */

.box{
    width:80%;
    height:500px;
    margin:20px auto;
    background:#F1E2D1;
    border-radius:15px;
    box-shadow:0px 0px 15px #8d8587;
}

/* ================= BUTTONS ================= */

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}

.button{
    background:#541A1A;
    color:#F1E2D1;
    padding:12px 30px;
    border-radius:8px;
    text-decoration:none;
    transition:0.5s;
    box-shadow:0px 0px 15px #767172;
}

.button:hover{
    transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:18px;
    margin-top:auto;
}

/* ================= MOBILE ================= */

@media(max-width:480px)
{
    header h1{
        font-size:20px;
    }

    .controls{
        width:95%;
        padding:20px;
    }

    .box{
        width:95%;
        height:250px;
    }

    .button{
        width:80%;
        text-align:center;
    }
}

</style>
</head>

<body>

<header>

    <a href="javapractice.html" class="back-btn">←</a>

    <h1>RGB Color Controller</h1>

</header>

<div class="controls">

  <input type="color" id="mycolor">
  <br/><br/>

  <input type="range" min="20" max="255" value="50" id="red"><br/>
  <input type="range" min="20" max="255" value="50" id="green"><br/>
  <input type="range" min="20" max="255" value="50" id="blue"><br/>

</div>

<div class="box" id="box"></div>



<script>

var d = document.getElementById("mycolor")
var red = document.getElementById("red")
var green = document.getElementById("green")
var blue = document.getElementById("blue")

d.onchange = function(){
    document.getElementById("box").style.background = this.value
}

function updateColor(){
    let c2 = `rgb(${red.value},${green.value},${blue.value})`;
    document.getElementById("box").style.background = c2;
}

red.oninput = updateColor;
green.oninput = updateColor;
blue.oninput = updateColor;

</script>

<footer>
    © 2026 All Rights Reserved
</footer>

</body>
</html>
