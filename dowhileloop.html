<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Downloading PDF File</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}


header{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    position:relative;
}

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    text-decoration:none;
    background:#F1E2D1;
    color:#541A1A;
    padding:8px 15px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}


main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}



.box{
    width:350px;
    background:#DCC3AA;
    padding:40px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}



.btn{
    display:inline-block;
    padding:12px 30px;
    background:#541A1A;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#810B38;
}



footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:15px;
}

@media(max-width:600px){

header{
    font-size:22px;
}

.box{
    width:90%;
}

}

</style>
</head>

<body>

<header>

<a href="../html/htmlpractice.html" class="back-btn">←</a>

DOWNLOADING PDF FILE

</header>

<main>

<div class="box" id="result">

Loading...

</div>

</main>

<footer>

© 2026 | All Rights Reserved |

</footer>

<script>

var pw = "1231";
var response;
var turn = 0;

do{

    response = prompt("Enter Password to Download...");

    if(response === pw){

        document.getElementById("result").innerHTML =
        "<a href='javascript1.pdf' class='btn' download>Download PDF</a>";

        break;
    }

    turn++;

    if(turn >= 3){

        alert("❌ Access Denied");

        document.getElementById("result").innerHTML =
        "<h2 style='color:#541A1A;'>Access Denied</h2>";

        break;
    }

    alert("Wrong Password");

}while(turn < 3);

</script>

</body>
</html>
