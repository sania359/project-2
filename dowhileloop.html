<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>
body
{
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background-color: #fbffca;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

header
{
    font-size:30px;
    text-transform:uppercase;
    font-family:Arial black;
    background:#622B14;
    color:#E4D6A9;
    text-align:center;
    box-sizing:border-box;
    padding:20px;
    box-shadow:5px 5px 5px rgb(136, 207, 162);
    width:45%;
    margin:auto;
    margin-bottom:50px;
    margin-top:20px;
}

h1{
    padding: 6px 25px;
    font-size: 22px;
    color: rgb(0, 0, 0);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.50s;
    border:2px solid black;
    text-align: center;
    width: fit-content;
    margin: auto; 
}

h1:hover{
    transform: scale(1.1);
    background: #622B14;
}

a{
   color: black;
   text-decoration: none;
}

footer{
    background:#622B14;
    color:#E4D6A9;
    text-align:center;
    padding:20px;
    margin-top:auto;
}
</style>
</head>

<body>

<header>
DOWNLOADING PDF FILE 
</header>

<!--
<h1><a href='javascript1.pdf'>Download File</a></h1>
-->

<script>
    var pw = "1231"
    var response;
    var turn = 0

    do
    {
        response = prompt("Enter Password to Download...")

        if(response===pw)
        {
            document.write("<h1><a href='javascript1.pdf'>Download File</a></h1>");
            break;
        }

        if(turn>=3)
        {
            alert("❌Access Denied.. # turn are over")
        }

        turn++
    }while(turn<=3)
</script>

<footer>
    <p>© 2026 | All Rights Reserved |</p>
</footer>

</body>
</html>
