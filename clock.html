<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif; 
}

body{
    background:#eef2f5;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px;
}

/* ================= HEADER ================= */

header{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px;
    font-size:32px;
    font-family:Arial Black;
    border-radius:18px;
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
    letter-spacing:1px;
    position:relative;
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

.container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#clock{
    width:320px;
    padding:30px;
    text-align:center;
    font-size:42px;
    font-family:Arial Black;
    background:#541A1A;
    color:#F1E2D1;
    border-radius:25px;
    box-shadow:0 8px 15px rgba(0,0,0,0.25);
    margin-bottom:30px;
    letter-spacing:2px;
}

.btn-box{
    display:flex;
    gap:20px;
}

button{
    padding:14px 28px;
    border:none;
    border-radius:40px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
}

.start{
    background:#16a34a;
    color:white;
}

.start:hover{
    background:#166534;
    transform:scale(1.05);
}

.stop{
    background:#dc2626;
    color:white;
}

.stop:hover{
    background:#7f1d1d;
    transform:scale(1.05);
}

/* ================= BACK BUTTON (OLD STYLE FIXED) ================= */

.back-fixed{
    width:140px;
    padding:12px;
    border:none;
    border-radius:40px;
    background:#541A1A;
    color:#F1E2D1;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
    margin:80px auto 0;
    display:block;
}

.back-fixed:hover{
    transform:translateY(-3px);
}

/* ================= FOOTER ================= */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    border-radius:15px;
    margin-top:30px;
    font-size:15px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
    font-size:24px;
    padding:18px;
}

#clock{
    width:90%;
    font-size:32px;
}

button{
    font-size:14px;
    padding:12px 20px;
}

.back-btn{
    font-size:12px;
    padding:8px 12px;
}

}

</style>
</head>

<body>

<header>
    <button class="back-btn" onclick="history.back()">←</button>
    WORKING WITH DATE CLASS IN JS
</header>   

<div class="container">
    <div id="clock">Time</div>

    <div class="btn-box">
        <button class="start" onclick="st()">Start</button>
        <button class="stop" onclick="sto()">Stop</button>
    </div>

    
</div>

<script>
function show(){
    var d = new Date()
    document.getElementById("clock").innerHTML = d.toLocaleTimeString()
}

var timer

function st(){
    timer = setInterval(show,1000)
}

function sto(){
    clearInterval(timer)
}
</script>

<footer>
<p>| All Rights Reserved |</p>
</footer>

</body>
</html>
