<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Banner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}

header h1{
    font-size:34px;
}

/* Back Button */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}

/* Main */

main{
    flex:1;
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

/* Slider */

#mask{
    width:100%;
    height:500px;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.slider{
    width:500%;
    height:100%;
    display:flex;
    animation:slider 20s infinite;
}

.slider img{
    width:20%;
    height:100%;
    object-fit:cover;
    flex-shrink:0;
}

@keyframes slider{

0%,15%{
    transform:translateX(0%);
}

20%,35%{
    transform:translateX(-20%);
}

40%,55%{
    transform:translateX(-40%);
}

60%,75%{
    transform:translateX(-60%);
}

80%,95%{
    transform:translateX(-80%);
}

100%{
    transform:translateX(0%);
}

}

/* Footer */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
}

footer p{
    margin:5px 0;
}

/* Tablet */

@media(max-width:900px){

#mask{
    height:350px;
}

}

/* Mobile */

@media(max-width:600px){

header h1{
    font-size:22px;
}

.back-btn{
    left:10px;
    padding:8px 14px;
    font-size:14px;
}

#mask{
    height:220px;
}

}

</style>
</head>

<body>

<header>

<a href="htmlpractice.html" class="back-btn">←</a>

<h1>RUN BANNER</h1>

</header>

<main>

<div id="mask">

<div class="slider">

<img src="images/f1.jpg" alt="Banner 1">
<img src="images/f2.jpg" alt="Banner 2">
<img src="images/f3.jpg" alt="Banner 3">
<img src="images/f4.jpg" alt="Banner 4">
<img src="images/f5.jpg" alt="Banner 5">

</div>

</div>

</main>

<footer>

<p>© 2026</p>
<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
