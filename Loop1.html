<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tables App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}



body{
    background:#F1F7D4;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:8px;
    overflow:hidden;
}



.app{
    width:100%;
    max-width:380px;
    height:95vh;
    background:#ffffff;
    border-radius:22px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 15px rgba(0,0,0,0.15);
}



header{
    background:#4A4466;
    color:white;
    text-align:center;
    padding:12px;
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
}



.content{
    flex:1;
    padding:10px;
    display:flex;
    flex-direction:column;
}



#box{
    flex:1;
    background:#F1F7D4;
    border-radius:16px;
    padding:6px;
    display:flex;
    flex-direction:column;
    justify-content:space-evenly;
}


#box h1{
    font-size:22px;
    background:#9FCBAD;
    color:#4A4466;
    padding:8px;
    margin:3px 0;
    border-radius:12px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.12);
    transition:0.3s;
}

#box h1:hover{
    transform:scale(1.02);
    background:#6EADBC;
    color:white;
}



.bottom-btns{
    display:flex;
    gap:8px;
    margin-top:8px;
}

.btn{
    flex:1;
    padding:10px;
    border:none;
    border-radius:10px;
    font-size:14px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.3s;
}



.home{
    background:#6EADBC;
}


.reset{
    background:#4A4466;
}

.btn:hover{
    transform:scale(1.03);
    opacity:0.9;
}



@media(max-height:650px){

header{
    font-size:17px;
    padding:10px;
}

#box h1{
    font-size:13px;
    padding:4px;
}

.btn{
    padding:8px;
    font-size:12px;
}

}

</style>
</head>

<body>

<div class="app">

<header>
<h2>📚 Tables For Kids</h2>
</header>

<div class="content">

<div id="box">

<script>

var n = 2
n = prompt("Enter A Number...","2")

document.write("<h1>Table of "+n+"</h1>");

for(var i =1;i<=10;i++)
{
    document.write("<h1>"+n+" × "+i+" = "+n*i+"</h1>")
}

</script>

</div>


<div class="bottom-btns">

<button class="btn home" onclick="history.back()">
🏠 Back
</button>

<button class="btn reset" onclick="window.location.reload()">
🔄 Reset
</button>

</div>

</div>

</div>

</body>
</html>
