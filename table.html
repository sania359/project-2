<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Record</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#f2f2f2;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    color:#541A1A;
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
    flex:1;
    width:90%;
    max-width:1100px;
    margin:35px auto;
}

/* ================= TABLE ================= */

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    overflow:hidden;
    border-radius:10px;
}

caption{
    font-size:32px;
    font-weight:bold;
    color:#541A1A;
    padding:20px;
}

th{
    background:#541A1A;
    color:#F1E2D1;
    padding:15px;
    border:1px solid #ddd;
    font-size:18px;
}

td{
    text-align:center;
    padding:14px;
    border:1px solid #ddd;
    transition:.3s;
}

tr:hover{
    background:#fdf9fa;
}

td:hover{
    background:#541A1A;
    color:#F1E2D1;
    transform:scale(1.04);
    font-weight:bold;
}

/* ================= FOOTER ================= */

footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
    font-size:16px;
}

footer p{
    margin:6px 0;
}

/* ================= TABLET ================= */

@media(max-width:1024px){

    main{
        width:95%;
    }

}

/* ================= MOBILE ================= */

@media(max-width:768px){

    header{
        font-size:24px;
        padding:20px 15px;
    }

    .back-btn{
        left:10px;
        padding:8px 12px;
        font-size:14px;
    }

    caption{
        font-size:24px;
    }

    th,
    td{
        font-size:14px;
        padding:10px 6px;
    }

    td:hover{
        transform:none;
    }

    main{
        overflow-x:auto;
    }

    table{
        min-width:650px;
    }

    footer{
        font-size:14px;
    }

}

</style>
</head>

<body>

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    Student Annual Record

</header>

<main>

<table>

</body>
</html>
