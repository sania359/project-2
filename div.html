<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    padding:0;
    background:#e5e5e5;
}


#header{
    width:90%;
    height:180px;
    background:black;
    color:white;
    margin:20px auto;
    text-align:center;

    font-size:30px;
    border-radius:25px;
    box-shadow:0 5px 15px gray;
}


.background{
    width:720px;
    height:740px;
    background:rgb(255, 255, 255);
    border-radius:25px;
    margin:auto;
    position:relative;
    padding:20px;
}


#box2{
    width:350px;
    height:260px;
    background:#ffafaf;
    border-radius:40px;
    position:absolute;
    top:20px;
    left:20px;

}


#box3{
    width:350px;
    height:450px;
    background:#ffafaf;
    border-radius:40px;
    position:absolute;
    top:300px;
    left:20px;
    
}


#box4{
    width:350px;
    height:435px;
    background:#ffafaf;
    border-radius:40px;
    position:absolute;
    top:20px;
    right:20px;
}

#box5{
    width:350px;
    height:290px;
    background:#ffafaf;
    border-radius:40px;
    position:absolute;
    bottom:20px;
    right:20px;
}

/* Footer */
footer{
    width:90%;
    background:#222;
    color:white;
    text-align:center;
    padding:50px;
    margin:20px auto;
    border-radius:15px;
}

</style>
</head>

<body>

<div id="header">Header</div>

<div class="background">
    <div id="box2"></div>
    <div id="box3"></div>
    <div id="box4"></div>
    <div id="box5"></div>
</div>

<footer>

    footer
</footer>

</body>
</html>
