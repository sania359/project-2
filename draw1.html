<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="color" style="position: absolute;" id="mycolor">
    <canvas id="mycan" style="background:rgb(233,241,241)" width="600" height="600"></canvas>
    <script>
        var c = document.getElementById("mycan");
        var mycolor = document.getElementById("mycolor");
    var k;
    var r = 10
    var d = c.getContext("2d");
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    var red ,green ,blue ,drawcolor
    var drawcolor = false
    drawcolor ="red"

    mycolor.onchange = function()
    {
        //alert(this.value)
        drawcolor = this.value
    }

    function f1(event)
    {
        //alert(event.keyCode)
        k = event.key
        switch(k)
        {
           case "+":
            if(r<100) 
            {
                r=r+1
                 document.title =r
            }
               break;

            case "-":
            if(r>10)
            {
                document.title = r
            }
               break;
            
            case " ":
               d.clearRect(0,0,window.innerWidth,window.innerHeight)
               break;
        }   
    }

    function draw(event)
    {
        if(dramode)
    {
      //document.title = "x ="+event.pageX+" y="+event.pageY
      var x = event.pageX
      var y = event.pageY
        red = Math.round(Math.random()*255)
        green = Math.round(Math.random()*255)
        blue = Math.round(Math.random()*255)
    drawcolor ="rgb("+red+","+green+","+blue+")"

    d.beginPath();
    //d.arc(x,y,r,0,2 *Math.PI);
    //d.rect(x,y,r,r);
    d.moveTo(x,y)
    d.lineTo(Math.random()*1200,Math.random()*1200);
    d.fillStyle = drawcolor
    d.fill()
    d.lineWidth=Math.random()*110
    d.strokeStyle=drawcolor
    d.stroke();
    }
    }

    function f2()
    {
        drawmode = (ldrawmode)?true:false
        /*
        if(ldrawmode)
        {
         drawmode = true
        }
         else
         {
         drawmode = false

         */

         document.title = dramode
    }

    document.addEventListener("keydown",f1)
    document.addEventListener("click",f2)
    document.addEventListener("mousemove",draw)
        
    </script>
</body>
</html>
