<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Canvas</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:#DCC3AA;
    display:flex;
    flex-direction:column;
}



header{
    width:100%;
    background:#541A1A;
    color:#DCC3AA;
    text-align:center;
    padding:18px;
}

header h1{
    font-size:32px;
}



.info{
    width:90%;
    max-width:700px;
    margin:20px auto;
    background:#541A1A;
    color:#DCC3AA;
    padding:12px 18px;
    text-align:center;
    border-radius:8px;
    font-size:16px;
}

.canvas-box{
    width:95%;
    max-width:900px;   
    background:#fff;
    margin:20px auto;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}



canvas{
    width:100%;
    height:600px;    
    border:4px solid #541A1A;
    border-radius:8px;
    display:block;
    cursor:crosshair;
}



.btn-area{
    margin-top:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

button,
.back-btn{
    padding:10px 25px;
    border:none;
    border-radius:6px;
    background:#541A1A;
    color:#DCC3AA;
    font-size:16px;
    cursor:pointer;
    text-decoration:none;
    transition:.3s;
}

button:hover,
.back-btn:hover{
    background:#6d2323;
}


footer{
    width:100%;
    background:#541A1A;
    color:#DCC3AA;
    text-align:center;
    padding:15px;
    margin-top:20px;
}



@media(max-width:768px){

    header h1{
        font-size:24px;
    }

    .info{
        font-size:14px;
    }

    .canvas-box{
        width:95%;
    }

    button,
    .back-btn{
        width:100%;
        max-width:220px;
    }

}



@media(max-width:768px){

    .canvas-box{
        width:95%;
        padding:15px;
    }

    canvas{
        height:450px;
    }

}

@media(max-width:480px){

    canvas{
        height:350px;
    }

}

</style>
</head>

<body>

<header>
    <h1>🎨 JavaScript Drawing Canvas</h1>
</header>

<div class="info">
    Move Mouse = Draw | R = Increase Size | T = Decrease Size | Space = Clear
</div>

<div class="canvas-box">

    <canvas id="mycan" width="600" height="600"></canvas>

    <div class="btn-area">

        <button onclick="clearCanvas()">Clear Drawing</button>

        <a href="htmlpractice.html" class="back-btn">Back</a>

    </div>

</div>

<footer>
    © 2026 Sania Portfolio
</footer>

<script>

var c = document.getElementById("mycan");
var d = c.getContext("2d");

var r = 10;

var red, green, blue, drawcolor;

function f1(event){

    var k = event.key;

    switch(k){

        case "r":
            if(r < 100){
                r++;
            }
            break;

        case "t":
            if(r > 10){
                r--;
            }
            break;

        case " ":
            clearCanvas();
            break;

    }

}

function draw(event){

    var x = event.offsetX;
    var y = event.offsetY;

    red = Math.round(Math.random()*255);
    green = Math.round(Math.random()*255);
    blue = Math.round(Math.random()*255);

    drawcolor = "rgb(" + red + "," + green + "," + blue + ")";

    d.beginPath();
    d.arc(x, y, r, 0, 2*Math.PI);
    d.fillStyle = drawcolor;
    d.fill();
    d.stroke();

}

function clearCanvas(){

    d.clearRect(0,0,c.width,c.height);

}

document.addEventListener("keydown",f1);

c.addEventListener("mousemove",draw);

</script>

</body>
</html>
