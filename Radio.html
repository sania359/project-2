<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Slider</title>


<style>

*
{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}


body
{
    background:#f2f2f2;
}




header
{
    height:80px;
    background:#853953;
    color:#F3F4F4;e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
}



.banner
{
    width:800px;
    height:400px;
    margin:50px auto 20px;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0px 5px 15px gray;
}


.banner img
{
    width:100%;
    height:100%;
    object-fit:cover;
}



.radios
{
    text-align:center;
    margin:20px;
}


.radios input
{
    width:18px;
    height:18px;
    margin:8px;
    cursor:pointer;
}



footer
{
    height:70px;
    background:#853953;
    color:#F3F4F4;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:80px;
    font-size:18px;
}



</style>

</head>


<body onload="show()">



<header>Automatic Radio Banner</header>



<div class="banner">

    <img src="images/j1.jpg" id="p">

</div>



<div class="radios">

<input type="radio" name="slide" class="slide" id="r1">

<input type="radio" name="slide" class="slide" id="r2">

<input type="radio" name="slide" class="slide" id="r3">

<input type="radio" name="slide" class="slide" id="r4">


</div>








<script>


var p = document.getElementById("p");

var s = document.getElementsByClassName("slide");

var c = 1;

var t;



function show()
{


p.src="images/j"+c+".jpg";


s[c-1].checked=true;


c++;


if(c>4)
{
    c=1;
}


t=setTimeout(show,2000);


}





s[0].onclick=function()
{

clearTimeout(t);

c=1;

p.src="images/j1.jpg";

}



s[1].onclick=function()
{

clearTimeout(t);

c=2;

p.src="images/j2.jpg";

}



s[2].onclick=function()
{

clearTimeout(t);

c=3;

p.src="images/j3.jpg";

}



s[3].onclick=function()
{

clearTimeout(t);

c=4;

p.src="images/j4.jpg";

}



</script>
<footer>

    © 2026 | All Rights Reserved

</footer>




</body>
</html>
