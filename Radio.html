<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Image Slider</title>

<style>

*
{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body
{
    background:#F1E2D1;
}



header
{
    height:80px;
    background:#541A1A;
    color:#F1E2D1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:bold;
    position:relative;
}


.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:8px 14px;
    border-radius:8px;
    font-size:14px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}


.banner
{
    width:800px;
    height:400px;
    margin:50px auto 20px;
    overflow:hidden;
    border-radius:15px;
    box-shadow:0px 5px 15px gray;
}

.banner img
{
    width:100%;
    height:100%;
    object-fit:cover;
}



.radios
{
    text-align:center;
    margin:20px;
}

.radios input
{
    width:18px;
    height:18px;
    margin:8px;
    cursor:pointer;
}



footer
{
    height:70px;
    background:#541A1A;
    color:#F1E2D1;
    display:flex;
    align-items:center;
    justify-content:center;
    margin-top:80px;
    font-size:18px;
}


@media(max-width:768px){

    header{
        font-size:20px;
        padding:10px;
    }

    .banner{
        width:95%;
        height:250px;
    }

    .back-btn{
        font-size:12px;
        padding:6px 10px;
    }
}

</style>

</head>

<body onload="show()">

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    Automatic Radio Banner

</header>

<div class="banner">

    <img src="images/f1.jpg" id="p">

</div>

<div class="radios">

<input type="radio" name="slide" class="slide" id="r1">
<input type="radio" name="slide" class="slide" id="r2">
<input type="radio" name="slide" class="slide" id="r3">
<input type="radio" name="slide" class="slide" id="r4">

</div>

<script>

var p = document.getElementById("p");
var s = document.getElementsByClassName("slide");
var c = 1;
var t;

function show()
{
    p.src="images/j"+c+".jpg";
    s[c-1].checked=true;

    c++;

    if(c>4){
        c=1;
    }

    t=setTimeout(show,2000);
}

s[0].onclick=function(){
clearTimeout(t);
c=1;
p.src="images/j1.jpg";
}

s[1].onclick=function(){
clearTimeout(t);
c=2;
p.src="images/j2.jpg";
}

s[2].onclick=function(){
clearTimeout(t);
c=3;
p.src="images/j3.jpg";
}

s[3].onclick=function(){
clearTimeout(t);
c=4;
p.src="images/j4.jpg";
}

</script>

<footer>
    © 2026 | All Rights Reserved
</footer>

</body>
</html>
