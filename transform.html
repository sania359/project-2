<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transform</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial;
}

/* Animation */
@keyframes ani{
    from{
        transform:rotateY(0deg) rotateX(0deg) rotateZ(0deg);
    }
    to{
        transform:rotateY(350deg) rotateX(34deg) rotateZ(230deg);
    }
}

/* Header */
header{
    width:60%;
    margin:25px auto;
    background:#963232;
    border-radius:60px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
    padding:25px;
}

header h1{
    text-align:center;
    font-size:30px;
    text-transform:uppercase;
    color:white;
}

/* Container */
#container{
    width:500px;
    height:500px;
    background-color:rgb(245, 245, 245);
    margin-top:40px;
    text-align:center;
    perspective:360px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* 3D Box */
#p1{
    width:200px;
    height:200px;
    background-color:black;
    position:relative;
    top:120px;
    left:150px;
    animation:ani 5s linear infinite alternate;
}

/* Image */
.pic{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Footer */
footer{
    width:100%;
    color:white;
    margin-top:auto;
    padding:25px;
    background:#963232;
    text-align:center;
    box-shadow:0 -5px 15px rgba(0,0,0,0.3);
    font-size:18px;
}

</style>
</head>

<body>

<header>
    <h1>3D Animation</h1>
</header>

<div id="container">

    <div id="p1">
        <img src="images/p2.jpg" class="pic">
    </div>

</div>

<footer>
    © 2026 | All Rights Reserved |
</footer>

</body>
</html>
