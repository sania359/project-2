<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Photo Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* HEADER */
header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}

header h1{
    font-size:35px;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}

/* GALLERY */
main{
    flex:1;
    width:85%;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

/* IMAGE BOX */
.box{
    background:#fff;
    padding:10px;
    height:100%;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:.4s;
}

.box:hover{
    transform:translateY(-8px);
}

.picstyle{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:12px;
    transition:.4s;
}

.picstyle:hover{
    transform:scale(1.05);
}

/* FOOTER */
footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:15px;
}

/* TABLET */
@media (max-width:1000px){
    main{
        width:90%;
        grid-template-columns:repeat(2,1fr);
    }
}

/* MOBILE */
@media (max-width:600px){
    header h1{
        font-size:22px;
    }

    main{
        width:90%;
        grid-template-columns:1fr;
    }
}

</style>

</head>

<body>

<header>
    <a href="htmlpractice.html" class="back-btn">←</a>
    <h1>WEB PHOTO GALLERY</h1>
</header>

<main>

    <div class="box">
        <a href="p1.html">
            <img src="./images/p1.jpg" class="picstyle" alt="Photo 1">
        </a>
    </div>

    <div class="box">
        <a href="p2.html">
            <img src="./images/p2.jpg" class="picstyle" alt="Photo 2">
        </a>
    </div>

    <div class="box">
        <a href="p3.html">
            <img src="./images/p3.jpg" class="picstyle" alt="Photo 3">
        </a>
    </div>

    <div class="box">
        <a href="p4.html">
            <img src="./images/p4.jpg" class="picstyle" alt="Photo 4">
        </a>
    </div>

    <div class="box">
        <a href="p5.html">
            <img src="./images/p5.jpg" class="picstyle" alt="Photo 5">
        </a>
    </div>

</main>

<footer>
    <p>© 2026</p>
    <p>| All Rights Reserved |</p>
</footer>

</body>
</html>
