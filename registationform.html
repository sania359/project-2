<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Registration Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#D9DCCB;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    font-size:32px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
    position:relative;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    color:#541A1A;
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
    flex:1;
    width:100%;
    display:flex;
    justify-content:center;
    padding:40px 20px;
}

/* ================= FORM CONTAINER ================= */

.container{
    width:100%;
    max-width:900px;
    background:#F1E2D1;
    padding:30px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,.12);
}

.container h2{
    margin-bottom:20px;
    color:#541A1A;
    text-align:center;
}

/* ================= GRID ================= */

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:18px;
}

.full{
    grid-column:span 2;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#541A1A;
}

.options{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
}

.options label{
    font-weight:normal;
}

/* ================= BUTTON ================= */

button{
    width:100%;
    padding:13px;
    border:none;
    background:#541A1A;
    color:#F1E2D1;
    font-size:16px;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

/* ================= FOOTER ================= */

footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

footer p{
    margin:6px 0;
}

/* ================= TABLET ================= */

@media(max-width:768px){

    header{
        font-size:26px;
        padding:20px;
    }

    .back-btn{
        left:10px;
        padding:8px 12px;
        font-size:14px;
    }

    .container{
        padding:20px;
    }

}

/* ================= MOBILE ================= */

@media(max-width:600px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:span 1;
    }

    .options{
        flex-direction:column;
        gap:8px;
    }

    header{
        font-size:22px;
    }

}

</style>
</head>

<body>

<header>

    <a href="htmlpractice.html" class="back-btn">←</a>

    Responsive Registration Form

</header>

<main>

<div class="container">

<h2>Registration Form</h2>

<form>

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<div>
<label>Username</label>
<input type="text" placeholder="Enter username">
</div>

<div>
<label>Email</label>
<input type="email" placeholder="Enter email">
</div>

<div>
<label>Phone</label>
<input type="tel" placeholder="Enter number">
</div>

<div>
<label>Password</label>
<input type="password">
</div>

<div>
<label>Confirm Password</label>
<input type="password">
</div>

<div>
<label>Date of Birth</label>
<input type="date">
</div>

<div>
<label>Upload Profile</label>
<input type="file">
</div>

<div class="full">
<label>Gender</label>

<div class="options">
<label><input type="radio" name="gender"> Male</label>
<label><input type="radio" name="gender"> Female</label>
<label><input type="radio" name="gender"> Prefer not to say</label>
</div>

</div>

<div class="full">
<label>Hobbies</label>

<div class="options">
<label><input type="checkbox"> Music</label>
<label><input type="checkbox"> Sports</label>
<label><input type="checkbox"> Reading</label>
<label><input type="checkbox"> Traveling</label>
</div>

</div>

<div class="full">
<label>Skills</label>

<div class="options">
<label><input type="checkbox"> Graphic Design</label>
<label><input type="checkbox"> UI/UX</label>
</div>

</div>

<div>
<label>Country</label>

<select>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
</select>

</div>

<div>
<label>Portfolio / Instagram</label>
<input type="url" placeholder="Enter link">
</div>

<div class="full">
<label>Address</label>
<textarea rows="3"></textarea>
</div>

<div class="full">
<button type="submit">Register</button>
</div>

</div>

</form>

</div>

</main>

<footer>

<p>© 2026</p>
<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
