<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color 2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui;
}

body{
    background:#FBF5DD;
    height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    width:100%;
    background:#0D530E;
    color:#E7E1B1;
    padding:20px;
    text-align:center;
}

.box{
    width:80%;
    height:500px;
    margin:auto;
    margin-top:20px;
   // background:#E7E1B1;
    border-radius:15px;
    box-shadow:0px 0px 15px #306D29;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}

.button{
    background:#0D530E;
    color:#E7E1B1;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0px 0px 10px gray;
}

footer{
    background:#0D530E;
    color:#E7E1B1;;
    text-align:center;
    padding:18px;
}

</style>
</head>

<body>

<header>
    <h1>Using Random And SetInterval</h1>
</header>

<div class="box" id="box"></div>

<div class="buttons">

    <div class="button" onclick="startColor()">
        Start
    </div>

    <div class="button" onclick="stopColor()">
        Stop
    </div>

    <a href="java.html" class="button">
        Back
    </a>

</div>

<footer>
    © 2026 All Rights Reserved
</footer>

<script>

var t;

function show()
{
    var r = Math.round(Math.random()*255);
    var g = Math.round(Math.random()*255);
    var b = Math.round(Math.random()*255);

    var c = `rgb(${r},${g},${b})`;

    document.getElementById("box").style.background = c;
}

function startColor()
{
    clearInterval(t);

    t = setInterval(show,1000);
}

function stopColor()
{
    clearInterval(t);
}

startColor();

</script>

</body>
</html>
