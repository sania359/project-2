<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif; 
  }
  
body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    font-size:32px;
    font-family:Arial Black;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px;
    box-shadow:2px 5px 8px black;
    margin-bottom:40px;
    border-radius:15px;
    position:relative;
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

.background{
    width:320px;
    margin:50px auto;
    background:#EDE9E6;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.field{
    display:flex;
    flex-direction:column;
    margin-bottom:12px;
}

label{
    font-weight:bold;
    margin-bottom:5px;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border-color:#000;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    background:#541A1A;
    color:#F1E2D1;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* ================= BACK BUTTON (OLD REMOVED STYLE KE BADLE) ================= */

.back-button{
    text-align:center;
    margin-top:20px;
}

.back-button a{
    display:inline-block;
    background:#541A1A;
    color:#F1E2D1;
    padding:10px 25px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.back-button a:hover{
    transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
    margin-top:auto;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:15px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
    font-size:24px;
    padding:18px;
}

.background{
    width:90%;
    margin:30px auto;
}

button{
    font-size:16px;
}

.back-btn{
    font-size:14px;
    padding:8px 12px;
}

}

</style>
</head>

<body>

<header>
    <a href="../html/htmlpractice.html" class="back-btn">←</a>
    CALCULATOR
</header>

<div class="background">

    <div class="field">
        <label>NO 1</label>
        <input type="number" id="t1" value="0">
    </div>

    <div class="field">
        <label>NO 2</label>
        <input type="number" id="t2" value="0">
    </div>

    <div class="field">
        <label>Result</label>
        <input type="number" id="r" value="0">
    </div>

    <div class="buttons">
        <button onclick="f1()">+</button>
        <button onclick="f2()">-</button>
        <button onclick="f3()">*</button>
        <button onclick="f4()">/</button>
    </div>

</div>

<script>
var n1 = document.getElementById("t1")
var n2 = document.getElementById("t2")
var n3 = document.getElementById("r")

function f1(){
    n3.value = parseInt(n1.value) + parseInt(n2.value)
}

function f2(){
    n3.value = parseInt(n1.value) - parseInt(n2.value)
}

function f3(){
    n3.value = parseInt(n1.value) * parseInt(n2.value)
}

function f4(){
    n3.value = parseInt(n1.value) / parseInt(n2.value)
}
</script>

<footer>
    <p>| All Rights Reserved |</p>
</footer>

</body>
</html>
