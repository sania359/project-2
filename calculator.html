<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
   
<style>

 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif; 
  }
  
body{
     background:#C9996B;
    min-height:100vh;
    display:flex;
    flex-direction:column;

}
header{
font-size:32px;
font-family:Arial Black;
background:#5C766D;
color:#EDE9E6;
text-align:center;
padding:20px;
box-shadow:2px 5px 8px black;
margin-bottom:40px;
border-radius:15px;
}

.background{
    width:320px;
    margin:50px auto;
    background:#EDE9E6;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.field{
    display:flex;
    flex-direction:column;
    margin-bottom:12px;
}

label{
    font-weight:bold;
    margin-bottom:5px;
}

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

input:focus{
    border-color:#000;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-top:15px;
}

button{
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
    background:#5C4F4A;
    color:#EDE9E6;
    transition:0.3s;
}

button:hover{
    background:#444;
    transform:scale(1.05);
}


.back-button{
    text-align:center;
    margin-top:20px;
}

.back-button a{
    display:inline-block;
    background:#5C4F4A;
    color:#EDE9E6;
    padding:10px 25px;
    border-radius:8px;
    text-decoration:none;
    transition:0.3s;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

.back-button a:hover{
    background:#444;
    transform:scale(1.05);
}
footer{
    margin-top:auto;
    background:#5C766D;
   color:#EDE9E6;
    text-align:center;
    padding:12px;
}


</style>
<body>
    <header>CALCULATOR</header>
  <div class="background">

    <div class="field">
    <label>NO 1</label>
    <input type="number" id="t1" value="0">
</div>

<div class="field">
    <label>NO 2</label>
    <input type="number" id="t2" value="0">
</div>

<div class="field">
    <label>Result</label>
    <input type="number" id="r" value="0">
</div>

    
    <div class="buttons">
        <button onclick="f1()">+</button>
        <button onclick="f2()">-</button>
        <button onclick="f3()">*</button>
        <button onclick="f4()">/</button>
    </div>

</div>

    <div class="back-button">
    <a href="java practice.html"> Back</a>
</div>

</div>
<script>
    var n1 = document.getElementById("t1")
    var n2 = document.getElementById("t2")
    var n3 = document.getElementById("r")
    
    function f1()
    {
        //alert("its working")
        var sum = parseInt(n1.value)+ parseInt(n2.value)
        n3.value=sum
    }
    function f2()
    {
         //alert("its working")
        var sum = parseInt(n1.value)- parseInt(n2.value)
        n3.value=sum
    }
     function f3()
    {
         //alert("its working")
        var sum = parseInt(n1.value) * parseInt(n2.value)
        n3.value=sum
    }
     function f4()
    {
         //alert("its working")
        var sum = parseInt(n1.value)/ parseInt(n2.value)
        n3.value=sum
    }
</script>
<footer>
<p>| All Rights Reserved |</p>
</footer>
 
</body>
</html>
