<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Table by While Loop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    background:#F1E2D1;
    display:flex;
    flex-direction:column;
}

/* HEADER WITH BACK BUTTON */
header{
    background:#541A1A;
    color:#F1E2D1;
    padding:20px;
    font-size:30px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);

    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

/* BACK BUTTON */
.back-btn{
    position:absolute;
    left:15px;
    background:#F1E2D1;
    color:#541A1A;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    transition:0.3s;
}

.back-btn:hover{
    transform:scale(1.05);
}

/* TABLE */
table{
    width:80%;
    margin:50px auto;
    background:white;
    box-shadow:0px 4px 10px rgba(0,0,0,0.2);
    border-radius:20px;
    overflow:hidden;
}

td{
    padding:15px;
    border:1px solid #dcdcdc;
}

input{
    width:100%;
    padding:6px;
    border:none;
    outline:none;
    border-radius:5px;
    background:#eff1f4;
    font-size:18px;
    text-align:center;
}

/* MAIN */
.content{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* FOOTER */
footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:15px;
    font-size:16px;
}

/* RESPONSIVE */
@media(max-width:600px){

header{
    font-size:20px;
    padding:15px;
}

table{
    width:95%;
}

td{
    padding:8px;
}

.back-btn{
    font-size:12px;
    padding:6px 10px;
}

}

</style>

</head>

<body>

<header>

<a href="javapractice.html" class="back-btn">←</a>

Working With While Loop

</header>

<table border="3" cellpadding="10">

<script>

var row = prompt("Enter Row Number to Create Table","5");
var col = prompt("Enter Column Number to Create Table","5");

var c = 1;

while(c<=row)
{
    document.write("<tr>");

    for(var i=1;i<=col;i++)
    {
        document.write("<td><input type='text'></td>");
    }

    document.write("</tr>");

    c++;
}

</script>

</table>

<div class="content">
</div>

<footer>
© 2026 | All Rights Reserved
</footer>

</body>
</html>
