<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern jQuery Accordion Menu</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>



<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#ffffff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}



header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px;
    font-size:32px;
    font-weight:700;
    letter-spacing:2px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}



.container{
    width:380px;
    max-width:95%;
    margin:50px auto;
}



.menu{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
}



.title{
    text-align:center;
    background:#F4F4F4;
    color:#541A1A;;
    padding:18px;
    font-size:24px;
    font-weight:700;
}



.menu h3{
    background:white;
    color:#374151;
    padding:18px 20px;
    font-size:19px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ececec;
    transition:.4s;
}

.menu h3:hover{
    background:#541A1A;
    color:#F1E2D1;
}

.arrow{
    font-size:12px;
}


.menu ul{
    display:none;
    list-style:none;
    background:#FAFAFA;
}

.menu ul li{
    border-bottom:1px solid #ECECEC;
}

.menu ul li:last-child{
    border-bottom:none;
}

.menu ul li a{
    display:block;
    padding:15px 25px;
    color:#555;
    text-decoration:none;
    transition:.3s;
}

.menu ul li a:hover{
    background:#541A1A;
    color:#F1E2D1;
    padding-left:35px;
}



footer{
    margin-top:auto;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:18px;
    font-size:16px;
}



@media(max-width:600px){

header{
    font-size:24px;
}

.container{
    width:95%;
}

.menu h3{
    font-size:17px;
}

}

</style>

</head>
<body>

<header>
Pull Down Menu
</header>

<div class="container">

<div class="menu">

<div class="title">
 Navigation Menu
</div>

<h3 id="main">
main
<span class="arrow">+</span>
</h3>

<ul id="mainMenu">
<li><a href="index.html"> Home</a></li>
<li><a href="about.html"> About</a></li>
<li><a href="contact.html"> Contact</a></li>
</ul>

<h3 id="project">
 Projects
<span class="arrow">+</span>
</h3>

<ul id="projectMenu">
<li><a href="practice.html">HTML & CSS</a></li>
<li><a href="javascript.html">JavaScript</a></li>
<li><a href="intro.html">jQuery</a></li>
<li><a href="https://www.behance.net/" target="_blank">Behance</a></li>
</ul>

<h3 id="social">
Social Media
<span class="arrow">+</span>
</h3>

<ul id="socialMenu">
<li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
<li><a href="https://www.instagram.com" target="_blank">Instagram</a></li>
<li><a href="https://www.facebook.com" target="_blank">Facebook</a></li>
</ul>



</div>

</div>

<script>

$(document).ready(function(){

   $("#main").click(function(){
   $("#mainMenu").slideToggle(400);

});

   $("#project").click(function(){
   $("#projectMenu").slideToggle(400);

});

   $("#social").click(function(){
   $("#socialMenu").slideToggle(400);

});

   $("#download").click(function(){
       $("#downloadMenu").slideToggle(400);

});
});

</script>

<footer>
 © 2026 | All Rights Reserved |
</footer>

</body>
</html>
