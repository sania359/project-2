<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider Banner</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    background:#853953;
    color:#F3F4F4;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.banner-section{
    display:flex;
    justify-content:center;
    padding:30px 20px;
    flex:1;
}

.banner-box{
    width:90%;
    max-width:1100px;
    height:450px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    position:relative;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.pic{
    width:100%;
    height:100%;
    position:absolute;
    top:0;
    left:0;
    object-fit:cover;
    transition:2s;
}

footer{
    background:#853953;
    color:#F3F4F4;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

@media(max-width:768px){

.banner-box{
    height:250px;
}

}

</style>
</head>

<body>

<header>
    Slider Banner
</header>

<section class="banner-section">
    <div class="banner-box">
        <img src="images/p1.jpg" class="pic">
        <img src="images/p2.jpg" class="pic">
        <img src="images/j3.jpg" class="pic">
        <img src="images/j4.jpg" class="pic">
        <img src="images/j5.jpg" class="pic">
    </div>
</section>



<script>

var plist = document.getElementsByTagName("img")

var p1 = plist[4]
var p2 = plist[3]
var j3 = plist[2]
var j4 = plist[1]
var j5 = plist[0]

var c = -1

function runbanner()
{
   switch(c)
   {
      case 0:
         p1.style.opacity = 0
         break;

      case 1:
         p2.style.opacity = 0
         break;

      case 2:
         j3.style.opacity = 0
         break;

      case 3:
         j4.style.opacity = 0
         break;

      case 4:
         p1.style.opacity = 1
         p2.style.opacity = 1
         j3.style.opacity = 1
         j4.style.opacity = 1
         j5.style.opacity = 1
         break;
   }

   if(c < 4)
      c++
   else
      c = 0

   setTimeout(runbanner, 5000)
}

runbanner()

</script>
<footer>
    © 2026 My Website | All Rights Reserved
</footer>
</body>
</html>
