
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice Work</title>

<style>

/* Body */
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
}

/* Header */
.header{
    background:#4a6656;
    color:white;
    text-align:center;
    padding:20px;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}

.header h1{
    margin:0;
    font-size:32px;
}

/* Main Section */
main{
    width:90%;
    margin:auto;
    padding:30px 0;
}

/* Title */
#list h2{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

/* List Container */
ol{
    padding:0;
    margin:0;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

/* Box Style */
ol li{
    list-style:none;
    width:30%;
    min-width:180px;
    background:white;
    padding:15px;
    text-align:center;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

/* Hover */
ol li:hover{
    background:#4a6656;
    transform:scale(1.05);
}

/* Link */
ol li a{
    text-decoration:none;
    color:black;
    font-size:18px;
    font-weight:bold;
    display:block;
}

/* Hover Link */
ol li:hover a{
    color:white;
}

/* Mobile Responsive */
@media(max-width:768px){
    ol li{
        width:45%;
    }
}

@media(max-width:500px){
    ol li{
        width:100%;
    }

    .header h1{
        font-size:24px;
    }
}

</style>
</head>

<body>

<header class="header">
   <h1>JavaScript Work</h1>
</header>

<main>

</body>
</html>
