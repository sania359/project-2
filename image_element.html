<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create element</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:#f4f4f4;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-family:Arial;
}


header{
    width:100%;
    margin:25px;
    background:#1F6F5F;
    border-radius:10px;
    box-shadow:0 10px 25px #EEEEEE(0,0,0,0.4);
    padding:25px;
    text-align:center;
    color:#EEEEEE;
}

#imgBox{
    display:flex;
    justify-content:center;
    margin:20px;
}

.button{
    
    width:100%;
    display:flex;
    justify-content:center;
    margin:20px 0;
    background:#1F6F5F;
    color:#EEEEEE;;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0px 0px 10px gray;
    transition:0.5s;
}

.button:hover
{
    transform:scale(1.05);
}

footer{
    width:100%;
    color:#EEEEEE;
    margin-top:auto;
    padding:25px;
    background:#1F6F5F;
    text-align:center;
    box-shadow:0 -5px 15px rgba(0,0,0,0.3);
    font-size:18px;
}

@media(max-width:768px){

    header{
        width:90%;
        border-radius:20px;
        padding:18px;
    }

    h1{
        font-size:24px;
        text-align:center;
        padding:40px;
    }

    img{
        width:80% !important;
    }

    footer{
        font-size:15px;
        padding:18px;
    }
}

</style>
</head>

<body>

  
    <header>
        <h1> Create Image Element By JavaScript</h1>
    </header>

    <div id="imgBox"></div>

   <div class="buttons">
    
  <a href="java practice.html" class="button">Back</a>
</div>

    <script>
     
     var p = document.createElement("img")

     document.getElementById("imgBox").appendChild(p)

      p.src="images/p1.jpg"

      p.style="transition:0.50s;margin:20px;border-radius:20px;cursor:pointer;"

      document.title ="No Error"

      p.style.width="30%"

      p.style.boxShadow="10px 10px 10px gray"

      p.onclick = function()
      {
        p.src="images/p1.jpg"
      }

      p.onmouseout = function()
      {
        p.src="images/p2.jpg"
        p.style.transform = "scale(1.10)"
      }

      p.onmouseover = function()
      {
        this.style.transform="scale(1.30)"
      }

    </script>

   
    <footer>
        © 2026 | All Rights Reserved |
    </footer>

</body>
</html>
