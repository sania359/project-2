
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu" />
    <title> Flyout menu</title>
</head>
<style>
    *{
        margin: 0px;
        padding: 0px;
        font-family: Arial, Helvetica, sans-serif;
        box-sizing: border-box;
    }
    #menu{
        margin-top: 10px;
        height: auto;
    }
    ol{
        margin-top: 10px;
        width:150px;
        background:#6A89A7;
        list-style: none;
        transition: 0.50s;
        position: relative;
        left: -2000px;
        //top: -15px;
    }
    ol li{
        padding: 10px;
        //margin-left: -40px;
    }
    ol li:hover{
        background:#BDDDFc;
    }
    #menu:hover ol{
        left: 0px;
        cursor: pointer;
    }

/* Header */
header{
    background:#4a6656;
    color:white;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}


/* for mobile screen */
@media (max-width:600px){
footer{
        font-size:14px;
        padding:10px;
    }
    header{
        font-size:24px ;
        padding: 15px;
    }
}
</style>
<body>

</body>
</html>
