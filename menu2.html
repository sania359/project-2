<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dropdown Menu</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    background:#F1E2D1;
    display:flex;
    flex-direction:column;
}



header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    padding:25px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
    position:relative;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}


.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    padding:10px 16px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}



#nav{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:50px;
    flex:1;
}

.menu_box{
    position:relative;
}

button{
    width:160px;
    padding:14px;
    background:#541A1A;
    color:#F1E2D1;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:black;
}

ol{
    position:absolute;
    top:55px;
    left:0;
    width:160px;
    background:#444;
    color:white;
    border-radius:8px;
    overflow:hidden;
}

li{
    list-style:none;
    padding:13px;
}

li:hover{
    background:white;
}

li a{
    text-decoration:none;
    color:white;
    display:block;
}

li:hover a{
    color:black;
}

.toggle{
    display:none;
}



footer{
    background:#541A1A;
    color:#F3F4F4;
    text-align:center;
    padding:18px;
    margin-top:auto;
}



@media (max-width:768px){

header{
    font-size:22px;
    padding:18px 60px;
}

.back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}

#nav{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    gap:25px;
    margin:40px 0;
    padding:0 20px;
}

.menu_box{
    width:100%;
    max-width:300px;
    position:relative;
}

button{
    width:100%;
    font-size:18px;
}


ol{
    position:static;
    width:100%;
    margin-top:8px;
    border-radius:8px;
}

li{
    text-align:center;
}

footer{
    margin-top:auto;
}

}

</style>
</head>

<body>

<header>
    <a href="../html/htmlpractice.html" class="back-btn">←</a>
    Dropdown Menu Design
</header>

<div id="nav">

    <div class="menu_box">

        <button onclick="show_hide_menu(event)" id="menu1">
            Main
        </button>

        <ol id="m" class="toggle">
            <li><a href="index.html">Home</a></li>
            <li><a href="html.html">Practice</a></li>
            <li><a href="html.html">Project</a></li>
        </ol>

    </div>

    <div class="menu_box">

        <button onclick="show_hide_menu(event)" id="menu2">
            Practice
        </button>

        <ol id="m2" class="toggle">
            <li><a href="html.html">HTML</a></li>
            <li><a href="javapractice.html">JavaScript</a></li>
            <li><a href="https://www.behance.net/saniadhamniya">Behance</a></li>
        </ol>

    </div>

    <div class="menu_box">

        <button onclick="show_hide_menu(event)" id="menu3">
            Social Media
        </button>

        <ol id="m3" class="toggle">
            <li><a href="https://youtube.com" target="_blank">YouTube</a></li>
            <li><a href="https://instagram.com" target="_blank">Instagram</a></li>
            <li><a href="https://pinterest.com" target="_blank">Pinterest</a></li>
        </ol>

    </div>

</div>

<script>

let m1 = document.getElementById("m");
let m2 = document.getElementById("m2");
let m3 = document.getElementById("m3");

function show_hide_menu(event){

    let menu = event.target.id;

    m1.classList.add("toggle");
    m2.classList.add("toggle");
    m3.classList.add("toggle");

    if(menu == "menu1"){
        m1.classList.remove("toggle");
    }
    else if(menu == "menu2"){
        m2.classList.remove("toggle");
    }
    else if(menu == "menu3"){
        m3.classList.remove("toggle");
    }
}

window.onclick = function(event){

    if(!event.target.matches("button")){
        m1.classList.add("toggle");
        m2.classList.add("toggle");
        m3.classList.add("toggle");
    }
}

</script>

<footer>
    © 2026 | All Rights Reserved |
</footer>

</body>
</html>
