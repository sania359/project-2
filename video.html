<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World View</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#F1E2D1;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

/* ================= HEADER ================= */

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:25px 20px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    position:relative;
}

header h1{
    font-size:34px;
    font-family:"Arial Black",sans-serif;
    text-transform:uppercase;
    letter-spacing:2px;
}

/* ================= BACK BUTTON ================= */

.back-btn{
    position:absolute;
    left:20px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
    background:#C2D099;
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
    flex:1;
    width:90%;
    max-width:1200px;
    margin:40px auto;
}

.video-container{
    max-width:850px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

video{
    width:100%;
    display:block;
    border-radius:12px;
}

/* ================= FOOTER ================= */

footer{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

footer p{
    margin:6px 0;
}

/* ================= TABLET ================= */

@media(max-width:992px){

header h1{
    font-size:28px;
}

.video-container{
    padding:15px;
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
    padding:20px 15px;
}

header h1{
    font-size:22px;
}

.back-btn{
    left:10px;
    padding:8px 12px;
    font-size:14px;
}

main{
    width:95%;
    margin:25px auto;
}

.video-container{
    padding:10px;
}

footer{
    font-size:14px;
}

}

</style>

</head>

<body>

<header>

<a href="htmlpractice.html" class="back-btn">←</a>

<h1>WORLD VIEW</h1>

</header>

<main>

<div class="video-container">

<video autoplay loop muted controls>

<source src="images/a2.mp4" type="video/mp4">

Your browser does not support this video.

</video>

</div>

</main>

<footer>

<p>© 2026</p>

<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
