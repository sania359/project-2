<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ready</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F1E2D1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* ================= HEADER ================= */

header{
    width:100%;
    font-size:30px;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:18px;
    box-shadow:2px 5px 8px rgba(0,0,0,0.3);
    position:relative;
}

/* BACK BUTTON INSIDE HEADER */
.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    font-size:14px;
    transition:0.3s;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

.main{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:30px;
    padding:20px;
}

/* ================= POPUP ================= */

.mystyle{
    width:500px;
    max-width:95%;
    height:360px;
    background:white;
    border-radius:15px;
    padding:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    position:relative;
}

.close-btn{
    position:absolute;
    top:10px;
    right:10px;
    border:none;
    background:none;
    cursor:pointer;
    font-size:18px;
}

/* ================= BUTTON ================= */

.button{
    background:#541A1A;
    color:#F1E2D1;
    padding:12px 35px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 10px gray;
    transition:0.3s;
}

.button:hover{
    transform:scale(1.05);
}

/* ================= FOOTER ================= */

footer{
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    padding:20px;
    margin-top:auto;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    header{
        font-size:20px;
        padding:15px;
    }

    .mystyle{
        height:280px;
    }

    .back-btn{
        font-size:12px;
        padding:6px 10px;
    }
}

</style>

</head>

<body>

<header>

    <a href="javapractice.html" class="back-btn">←</a>

    Pop-Up By Using Div

</header>

<div class="main">

    <div id="popup" class="mystyle">

        <button class="close-btn" onclick="closePopup()">❌</button>

        <iframe
            width="100%"
            height="300"
            src="https://www.youtube.com/embed/RtU8nBnpFVE?autoplay=1"
            frameborder="0"
            allowfullscreen>
        </iframe>

    </div>


</div>

<script>

function closePopup(){
    document.getElementById("popup").style.display="none";
}

</script>

<footer>
© 2026 All Rights Reserved
</footer>

</body>
</html>
