<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ready</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background:#bdc3cd;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}



header{
    font-size:30px;
    font-family:Arial Black;
    background:#111844;
    color:#EAE0CF;
    text-align:center;
    padding:15px;
    box-shadow:2px 5px 8px black;
    margin-bottom:25px;
    border-radius:12px;
    letter-spacing:2px;
}



.mystyle{
    width:500px;
    height:360px;
    background:#fff;
    border-radius:15px;
    padding:12px;
    border:none;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);

    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    overflow:hidden;
    z-index:999;
}


.close-btn{
    float:right;
    font-size:16px;
    border:none;
    background:none;
    cursor:pointer;
    color:#111844;
    font-weight:bold;
}


.buttons{
    width:100%;
    display:flex;
    justify-content:center;
    margin:20px 0;
}

.button{
    display:inline-block;
    background:#111844;
    color:#EEEEEE;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0px 0px 10px gray;
    transition:0.3s;
    font-weight:bold;
}

.button:hover{
    transform:scale(1.05);
   }

/* Footer */

footer{
    margin-top:auto;
    background:#111844;
    color:#EAE0CF;
    text-align:center;
    padding:25px;
    font-size:15px;
    border-radius:12px;
}

/* Mobile */

@media(max-width:768px){

    header{
        font-size:20px;
        padding:12px;
    }

    .mystyle{
        width:95%;
        height:280px;
    }

    footer{
        padding:20px;
        font-size:12px;
    }
}
</style>
</head>

<body>

<header>Pop-Up By Using Div</header>

<div class="buttons">
  <a href="java practice.html" class="button"> Back</a>
</div>

<script>

var p = document.createElement("div");

function show()
{
   document.body.appendChild(p);
   p.className = "mystyle";

   p.innerHTML = `
   <button class="close-btn" onclick="document.body.removeChild(p)">❌</button>

   <br>

   <iframe
        width="100%"
        height="300"
        src="https://www.youtube.com/embed/RtU8nBnpFVE?autoplay=1"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
   </iframe>`;
   

   setTimeout("closeadd()",10000);
}

setTimeout("show()",2000);



</script>

<footer>
    <p>© 2026 All Rights Reserved</p>
</footer>

</body>
</html>
