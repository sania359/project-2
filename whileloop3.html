<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing: border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

header{
    width:100%;
    background:#541A1A;
    color:#F1E2D1;
    text-align:center;
    font-size:32px;
    padding:15px;
    font-weight:bold;
    position:relative;
}


.back-btn{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    background:#F1E2D1;
    color:#541A1A;
    padding:8px 14px;
    border-radius:8px;
    text-decoration:none;
    font-size:14px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-50%) scale(1.05);
}


h1{
    width:100%;
    text-align:center;
    font-size:40px;
    padding:10px;
}


.image-box{
    width:90%;
    height:500px;
    margin:20px auto;
    box-shadow:10px 10px 10px gray;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}


.btn-box{
    text-align:center;
    margin:20px 0;
}


footer{
    background:#541A1A;
    color:#F1E2D1;
    width:100%;
    height:70px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-top:auto;
    font-size:18px;
}


@media(max-width:600px){

h1{
    font-size:24px;
}

.image-box{
    height:250px;
}

.back-btn{
    font-size:12px;
    padding:6px 10px;
}

}

</style>

</head>

<body>

<header>

<a href="../html/htmlpractice.html" class="back-btn">← </a>

Image Of The Day

</header>

<h1 id="m"></h1>

<div class="image-box">
    <img id="pic" src="" alt="Day Image">
</div>

<div class="btn-box"></div>

<script>

var d = new Date();
var m = document.getElementById("m");
var pic = document.getElementById("pic");

var today = d.getDay();

switch(today)
{
    case 1:
        m.innerHTML = "Monday";
        pic.src = "images/f1.jpg";
        break;

    case 2:
        m.innerHTML = "Tuesday";
        pic.src = "images/f2.jpg";
        break;

    case 3:
        m.innerHTML = "Wednesday";
        pic.src = "images/f3.jpg";
        break;

    case 4:
        m.innerHTML = "Thursday";
        pic.src = "images/f4.jpg";
        break;

    case 5:
        m.innerHTML = "Friday";
        pic.src = "images/f5.jpg";
        break;

    case 6:
        m.innerHTML = "Saturday";
        pic.src = "images/p1.jpg";
        break;

    case 0:
        m.innerHTML = "Sunday";
        pic.src = "images/p2.jpg";
        break;

    default:
        pic.src = "images/f1.jpg";
}

</script>

<footer>
    <p>© 2026 | All Rights Reserved |</p>
</footer>

</body>
</html>
