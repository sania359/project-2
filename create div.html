<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Creation</title>
</head>
<header>CREATE DIV</header>
<style>
        *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
background-color:#ffffff;
color:#333;
}
header{
    background:#070707d4;
    color:white;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}


.box
{
    border-radius:10px;
    transition:0.50s;
    width:300px;
    border:2px black solid;
    position:absolute;
    top:100px;
    left:100px;
    text-align:center;

}
.mystyle
{
    background:rgb(217, 212, 212);
}
footer{
    width:100%;
    color:white;
    background:#070707d4;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    left:0;
}
/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

    #footer{
        margin-top: 30px;
        font-size:14px;
        padding:10px;
    }
</style>


<body>
 <script>
    document.title="Create Element"

    var d = document.createElement("div");
            document.body.appendChild(d);
            d.className="box mystyle"

            d.innerHTML="<button style='margin-top:10px;margin-left:210px;'onclick='closedilog()'>X</button>"
            d.innerHTML+="<h2>GIF</h2>"
            d.innerHTML+="<hr color='black' size='3'</hr>"
            d.innerHTML+="<img src='images/g1.gif' style='width:300px;height:auto; margin:10px auto;display:block;'>"


            function closedilog()
            {
                document.body.removeChild(d)
            }
 </script>

<footer>All Rights Reserved</footer>
    
</body>

</html>
