<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Creation</title>
</head>
<header>CREATE DIV</header>
<style>
        *{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

html{
    scroll-behavior: smooth;
}

body{
    background:#FFF0E4;
   color:#333;
}

header{
    background:#007979;
    color:#FFE0C5;
    margin-bottom: 30px;
    text-align:center;
    padding:20px;
    font-size:30px;
    letter-spacing:2px;
    font-weight:bold;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}


.box{
    border-radius:10px;
    transition:0.50s;
    width:300px;
    border:2px black solid;
    text-align:center;
    background:#24B1B1;
    box-shadow:0px 0px 10px #007979;
    margin:40px auto;
    padding-bottom:20px;
}

.buttons{
    position:fixed;
    bottom:60px;
    width:100%;
    display:flex;
    justify-content:center;
}

.button{
    background:#007979;
    color:#FFE0C5;
    padding:12px 30px;
    border-radius:8px;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0px 0px 10px #007979;
    display:inline-block;
    display:flex;
    justify-content:center;
    transition:0.5s;
}

.button:hover
{
    transform:scale(1.05);
}

footer{
    width:100%;
    color:#FFE0C5;
    background:#007979;
    text-align:center;
    padding:10px;
    position:fixed;
    bottom:0;
    left:0;
}
/* Mobile Devices */
@media (max-width: 600px){

    header{
        font-size:20px;
        padding:15px;
    }

    #footer{
        margin-top: 30px;
        font-size:14px;
        padding:10px;
    }
</style>


<body>
    <div class="buttons">
    
  <a href="java practice.html" class="button">Back</a>
</div>

 <script>
    document.title="Create Element"

    var d = document.createElement("div");
            document.body.appendChild(d);
            d.className="box mystyle"

            d.innerHTML="<button style='margin-top:10px;margin-left:240px;' onclick='closedilog()'>X</button>"
            d.innerHTML+="<h2 style='color:#FFE0C5;''>GIF</h2>"
            d.innerHTML+="<hr color='black' size='3'</hr>"
            d.innerHTML+="<img src='images/g1.gif' style='width:300px;height:auto; margin:10px auto;display:block;'>"


            function closedilog()
            {
                document.body.removeChild(d)
            }
 </script>

<footer> © 2026 All Rights Reserved</footer>
    
</body>

</html>
