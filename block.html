<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Div Design Practice</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#F2F2F2;
display:flex;
flex-direction:column;
min-height:100vh;
}

/* ================= HEADER ================= */

header{
width:100%;
background:#541A1A;
color:#F1E2D1;
text-align:center;
padding:25px 20px;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

header h1{
font-size:34px;
font-family:"Arial Black",sans-serif;
letter-spacing:2px;
}

/* ================= BACK BUTTON ================= */

.back-btn{
position:absolute;
left:20px;
top:50%;
transform:translateY(-50%);
background:#F1E2D1;
color:#541A1A;
text-decoration:none;
padding:10px 18px;
border-radius:8px;
font-size:16px;
font-weight:bold;
transition:.3s;
box-shadow:0 4px 10px rgba(0,0,0,.2);
}

.back-btn:hover{
background:#C2D099;
transform:translateY(-50%) scale(1.05);
}

/* ================= MAIN ================= */

main{
flex:1;
width:90%;
max-width:1200px;
margin:40px auto;
}

.grid-container{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.box{
height:350px;
background:#fff;
padding:10px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,.15);
overflow:hidden;
transition:.4s;
}

.box:hover{
transform:translateY(-8px);
}

.box img{
width:100%;
height:100%;
object-fit:cover;
border-radius:12px;
}

/* ================= FOOTER ================= */

footer{
width:100%;
background:#541A1A;
color:#F1E2D1;
text-align:center;
padding:20px;
margin-top:auto;
}

footer p{
margin:6px 0;
}

/* ================= TABLET ================= */

@media(max-width:992px){

header h1{
font-size:28px;
}

.grid-container{
grid-template-columns:repeat(2,1fr);
}

}

/* ================= MOBILE ================= */

@media(max-width:768px){

header{
padding:20px 15px;
}

header h1{
font-size:22px;
}

.back-btn{
left:10px;
padding:8px 12px;
font-size:14px;
}

main{
width:95%;
margin:25px auto;
}

.grid-container{
grid-template-columns:1fr;
gap:20px;
}

.box{
height:280px;
}

footer{
font-size:14px;
}

}

</style>

</head>

<body>

<header>

<a href="htmlpractice.html" class="back-btn">←</a>

<h1>DIV (BLOCKS) LAYOUT</h1>

</header>

<main>

<div class="grid-container">

<div class="box">
<img src="images/p1.jpg" alt="Image 1">
</div>

<div class="box">
<img src="images/p2.jpg" alt="Image 2">
</div>

<div class="box">
<img src="images/p3.jpg" alt="Image 3">
</div>

</div>

</main>

<footer>

<p>© 2026</p>

<p>| All Rights Reserved |</p>

</footer>

</body>
</html>
